<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Subsidy & Scheme Eligibility Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="portal-badge">LIVE SECURE</span>
                <h1>Scheme Eligibility Engine</h1>
            </div>
            <div class="lang-wrapper">
                <label for="languageSelect">🌐</label>
                <select id="languageSelect" onchange="changeLanguage()">
                    <option value="en">English (US/UK)</option>
                    <option value="te">తెలుగు (Telugu)</option>
                </select>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="panel-card input-sidebar">
            <h2 id="lblFormTitle" class="panel-title">User Demographics</h2>
            <form id="eligibilityForm" onsubmit="evaluateEligibility(event)">
                
                <div class="input-field-group">
                    <label id="lblAge" for="age">Current Age (Years)</label>
                    <input type="number" id="age" min="0" max="120" value="28" required>
                </div>

                <div class="input-field-group">
                    <label id="lblSalary" for="salary">Annual Income / Salary ($/₹)</label>
                    <input type="number" id="salary" min="0" value="450000" required>
                </div>

                <div class="input-field-group">
                    <label id="lblGender" for="gender">Gender Identity</label>
                    <select id="gender">
                        <option value="All">All / Prefer not to say</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="input-field-group">
                    <label id="lblState" for="state">Regional Territory / State</label>
                    <select id="state">
                        <option value="All India">Universal / Nationwide Jurisdiction</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Maharashtra">Maharashtra</option>
                    </select>
                </div>

                <div class="input-field-group">
                    <label id="lblOccupation" for="occupation">Professional Occupation Group</label>
                    <select id="occupation">
                        <option value="All">General Public / Unspecified</option>
                        <option value="Farmer">Agricultural Worker / Farmer</option>
                        <option value="Student">Enrolled Scholar / Student</option>
                        <option value="Rural Underprivileged">Rural Disadvantaged / Underprivileged</option>
                        <option value="Urban Underprivileged">Urban Disadvantaged / Underprivileged</option>
                        <option value="Healthcare Personnel">Healthcare & Medical Worker</option>
                        <option value="Small Business Owner">MSME / Small Business Owner</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmit" class="glow-btn-primary">Evaluate Profile</button>
            </form>
        </aside>

        <main class="panel-card results-view">
            <h2 id="lblResultsHeader" class="panel-title text-gradient">Available Programs & Subsidies</h2>
            <div id="schemesContainer">
                <p class="placeholder-notice" id="lblPlaceholder">Please input your demographic profile matrix on the left panel to execute the eligibility evaluation engine.</p>
            </div>
        </main>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-window">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Program Details</h3>
            <div id="modalBody">Data payload loading...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
