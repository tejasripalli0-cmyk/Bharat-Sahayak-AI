<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Scheme Eligibility Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="flag-branding">
            <div class="stripe saffron"></div>
            <div class="stripe white">
                <svg class="chakra" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="#000080" stroke-width="2" fill="none"/>
                    <circle cx="50" cy="50" r="8" fill="#000080"/>
                    <script>
                        for(let i=0; i<24; i++) {
                            let angle = (i * 15) * Math.PI / 180;
                            let x2 = 50 + 45 * Math.cos(angle);
                            let y2 = 50 + 45 * Math.sin(angle);
                            document.write(`<line x1="50" y1="50" x2="${x2}" y2="${y2}" stroke="#000080" stroke-width="1.5" />`);
                        }
                    </script>
                </svg>
            </div>
            <div class="stripe green"></div>
        </div>
        <div class="nav-content">
            <h1>🇮🇳 National Scheme Eligibility Portal</h1>
            <select id="languageSelect" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="te">తెలుగు (Telugu)</option>
            </select>
        </div>
    </header>

    <div class="container">
        <main class="form-card">
            <h2 id="lblFormTitle">Check Your Eligibility</h2>
            <form id="eligibilityForm" onsubmit="evaluateEligibility(event)">
                <div class="form-group">
                    <label id="lblAge" for="age">Age</label>
                    <input type="number" id="age" min="0" max="120" value="25" required>
                </div>

                <div class="form-group">
                    <label id="lblSalary" for="salary">Annual Income (₹)</label>
                    <input type="number" id="salary" min="0" value="300000" required>
                </div>

                <div class="form-group">
                    <label id="lblGender" for="gender">Gender</label>
                    <select id="gender">
                        <option value="All">All / Other</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="lblState" for="state">State / UT Name</label>
                    <select id="state">
                        <option value="All India">All India (Central Schemes)</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="lblOccupation" for="occupation">Occupation / Category</label>
                    <select id="occupation">
                        <option value="All">General / Any Category</option>
                        <option value="Rural Underprivileged">Rural Underprivileged</option>
                        <option value="Urban Underprivileged">Urban Underprivileged</option>
                        <option value="Farmer">Farmer</option>
                        <option value="Student">Student</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">Check Eligibility</button>
            </form>
        </main>

        <section class="results-panel">
            <h2 id="lblResultsHeader">Eligible Schemes</h2>
            <div id="schemesContainer">
                <p class="placeholder-text" id="lblPlaceholder">Fill out your profile details on the left panel to find matching Government schemes.</p>
            </div>
        </section>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Scheme Information</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
